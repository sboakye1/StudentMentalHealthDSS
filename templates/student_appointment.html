<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Request Appointment - Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-primary: #f8fafc;
        --bg-card: #ffffff;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #64748b;
        --border-color: #e2e8f0;
        --accent-teal: #0d9488;
        --accent-blue: #2563eb;
        --accent-green: #10b981;
        --accent-amber: #f59e0b;
        --accent-rose: #ef4444;
      }

      * { box-sizing: border-box; }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("{{ url_for('static', filename='images/Background 5.JPG') }}") center/cover no-repeat fixed;
        color: var(--text-primary);
        min-height: 100vh;
        margin: 0;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 240px;
        height: 100vh;
        background: var(--bg-card);
        border-right: 1px solid var(--border-color);
        padding: 1.5rem 1rem;
        z-index: 1000;
        overflow-y: auto;
      }

      .sidebar-brand {
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--accent-blue);
        text-decoration: none;
        display: block;
        margin-bottom: 2rem;
        padding-left: 0.5rem;
      }

      .sidebar-nav {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .sidebar-nav .nav-item {
        margin-bottom: 0.25rem;
      }

      .sidebar-nav .nav-link {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        color: var(--text-secondary);
        text-decoration: none;
        border-radius: 8px;
        font-weight: 500;
        font-size: 0.9rem;
        transition: all 0.2s ease;
      }

      .sidebar-nav .nav-link:hover {
        background: rgba(37, 99, 235, 0.05);
        color: var(--accent-blue);
      }

      .sidebar-nav .nav-link.active {
        background: rgba(37, 99, 235, 0.1);
        color: var(--accent-blue);
        font-weight: 600;
      }

      .sidebar-nav .nav-icon {
        font-size: 1rem;
        width: 20px;
        text-align: center;
      }

      .main-content {
        margin-left: 240px;
        padding: 1.5rem 0;
      }

      @media (max-width: 991.98px) {
        .sidebar {
          width: 100%;
          height: auto;
          position: relative;
          border-right: none;
          border-bottom: 1px solid var(--border-color);
        }

        .main-content {
          margin-left: 0;
        }
      }

      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      }

      .card h3 {
        margin-top: 0;
        color: var(--text-primary);
        font-weight: 600;
        font-size: 1.25rem;
        margin-bottom: 1.5rem;
      }

      .form-label {
        color: var(--text-secondary);
        font-weight: 500;
        font-size: 0.9rem;
        margin-bottom: 0.4rem;
      }

      .btn-submit {
        background: var(--accent-blue);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1.25rem;
        font-weight: 600;
        font-size: 0.9rem;
      }

      .btn-submit:hover {
        background: #1d4ed8;
      }

      .btn-cancel {
        background: var(--border-color);
        color: var(--text-secondary);
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1.25rem;
        font-weight: 500;
        font-size: 0.9rem;
        text-decoration: none;
      }

      .sidebar-logo { height: 32px; width: auto; margin-right: 0.5rem; }
      .card { background: rgba(255, 255, 255, 0.95); }
    </style>
  </head>
  <body>
    <nav class="sidebar">
      <a class="sidebar-brand" href="{{ url_for('student_dashboard') }}"><img src="{{ url_for('static', filename='images/Logo.JPG') }}" alt="Logo" class="sidebar-logo">&#x1F3E5; Student Portal</a>
      <ul class="sidebar-nav">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('student_dashboard') }}">
            <span class="nav-icon">&#x1F3E5;</span>
            Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('student_survey') }}">
            <span class="nav-icon">&#x1F4CB;</span>
            Take Survey
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="{{ url_for('student_appointment') }}">
            <span class="nav-icon">&#x1F4C5;</span>
            Request Appointment
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('student_appointments') }}">
            <span class="nav-icon">&#x1F4C6;</span>
            My Appointments
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('student_profile') }}">
            <span class="nav-icon">&#x1F464;</span>
            My Profile
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('logout') }}">
            <span class="nav-icon">&#x1F511;</span>
            Logout
          </a>
        </li>
      </ul>
    </nav>

    <main class="main-content">
      <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h1 class="mb-0" style="font-weight: 700; font-size: 1.75rem; color: var(--text-primary);">Request Appointment</h1>
            <p class="text-secondary mb-0" style="font-size: 0.95rem; color: var(--text-secondary);">Schedule a time to meet with your counselor</p>
          </div>
          <a href="{{ url_for('student_dashboard') }}" class="btn-cancel">
            &#x21A9; Back to Dashboard
          </a>
        </div>

        <div class="card">
          <h3>Appointment Request Form</h3>
          <form action="{{ url_for('student_appointment') }}" method="POST">
            <div class="mb-3">
              <label for="preferred_date" class="form-label">Preferred Date</label>
              <input type="date" class="form-control" id="preferred_date" name="preferred_date" required>
            </div>
            <div class="mb-3">
              <label for="preferred_time" class="form-label">Preferred Time</label>
              <input type="time" class="form-control" id="preferred_time" name="preferred_time" required>
            </div>
            <div class="mb-3">
              <label for="appointment_type" class="form-label">Appointment Type</label>
              <select class="form-select" id="appointment_type" name="appointment_type" required>
                <option value="initial">Initial</option>
                <option value="follow_up">Follow-up</option>
                <option value="emergency">Emergency</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="reason" class="form-label">Reason for Appointment</label>
              <textarea class="form-control" id="reason" name="reason" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-submit">Submit Request</button>
            <a href="{{ url_for('student_dashboard') }}" class="btn-cancel">Cancel</a>
          </form>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
